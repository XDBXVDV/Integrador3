<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Corporativo | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container-fluid mt-4 px-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark m-0">
                <i class="fas fa-chart-line me-2 text-primary"></i>Panel de Control
            </h3>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-primary text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded"><i class="fas fa-dollar-sign fa-2x"></i></div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0 small text-uppercase">Ventas del Mes</h6>
                            <h2 class="mb-0 fw-bold" id="kpiVentas">S/ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-success text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded"><i class="fas fa-shopping-cart fa-2x"></i></div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0 small text-uppercase">Inversión Compras</h6>
                            <h2 class="mb-0 fw-bold" id="kpiCompras">S/ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-danger text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded"><i class="fas fa-box-open fa-2x"></i></div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0 small text-uppercase">Productos Críticos</h6>
                            <h2 class="mb-0 fw-bold" id="kpiCriticos">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h6 class="fw-bold mb-4 text-muted small text-uppercase">Comparativa: Ventas vs Compras (30 días)</h6>
                    <div style="height: 300px;">
                        <canvas id="chartVentasSemanales"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h6 class="fw-bold mb-4 text-muted small text-uppercase">Ventas por Categoría</h6>
                    <div style="height: 300px;">
                        <canvas id="chartCategorias"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h6 class="mb-0 fw-bold text-muted small text-uppercase">Top 5 Productos más Vendidos</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Producto</th>
                                        <th class="text-center">Unidades</th>
                                        <th class="text-end pe-4">Total Generado</th>
                                    </tr>
                                </thead>
                                <tbody id="tablaTopProductos">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
<script>
    verificarEmpleado();
</script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/navbarempleados.js"></script>
</body>
</html>
