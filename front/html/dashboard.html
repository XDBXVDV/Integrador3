<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Corporativo | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container-fluid mt-4 px-4">
        <h3 class="fw-bold mb-4 text-dark">
            <i class="fas fa-chart-pie me-2 text-primary"></i>Panel de Control TOISHAN
        </h3>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-primary text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded">
                            <i class="fas fa-dollar-sign fa-2x"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0">Ventas del Mes (Neto)</h6>
                            <h2 class="mb-0 fw-bold" id="kpiVentas">$ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-success text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded">
                            <i class="fas fa-shopping-cart fa-2x"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0">Inversión en Compras</h6>
                            <h2 class="mb-0 fw-bold" id="kpiCompras">$ 0.00</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm bg-danger text-white p-3">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0 bg-white bg-opacity-25 p-3 rounded">
                            <i class="fas fa-box-open fa-2x"></i>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <h6 class="mb-0">Productos Críticos</h6>
                            <h2 class="mb-0 fw-bold" id="kpiCriticos">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card border-0 shadow-sm p-4">
                    <h5 class="fw-bold mb-4 text-muted">FLUJO DE VENTAS (ÚLTIMOS 7 DÍAS)</h5>
                    <div style="height: 350px;">
                        <canvas id="chartVentasSemanales"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/dashboard.js"></script>
</body>
</html>
