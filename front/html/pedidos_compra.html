<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Requerimiento de Compra - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4 border-0">
                    <div class="card-header bg-dark text-white">
                        <h5 class="mb-0">Nuevo Requerimiento de Materiales</h5>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small">Seleccione los productos y cantidades necesarias para solicitar a compras.</p>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Producto</label>
                            <select id="selectProducto" class="form-select"></select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Cantidad Solicitada</label>
                            <input type="number" id="inputCantidad" class="form-control" min="1" value="1">
                        </div>
                        <button class="btn btn-primary w-100" onclick="agregarItem()">
                            <i class="fas fa-plus"></i> Agregar a la Lista
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Lista de Solicitud</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th class="text-center">Cantidad</th>
                                    <th class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaDetalle"></tbody>
                        </table>
                    </div>
                    <div class="card-footer bg-white">
                        <button class="btn btn-success w-100 py-2 fw-bold" onclick="procesarRequerimiento()">
                            <i class="fas fa-paper-plane"></i> ENVIAR REQUERIMIENTO
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/pedidos_compra.js"></script>
</body>
</html>
