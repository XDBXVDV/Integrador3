<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Iniciar Sesión</h2>

<form id="formLogin">

<div class="mb-3">
<input type="text" id="usuarioLogin" class="form-control" placeholder="Usuario" required>
</div>

<div class="mb-3">
<input type="password" id="contrasenaLogin" class="form-control" placeholder="Contraseña" required>
</div>

<button type="submit" class="btn btn-primary w-100">
Ingresar
</button>

</form>

<div class="mt-3 text-center">
<a href="#" data-bs-toggle="modal" data-bs-target="#modalRegistro">
Crear cuenta
</a>
</div>


<!-- MODAL CREAR CLIENTE -->

<div class="modal fade" id="modalRegistro">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Crear Cuenta</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="formRegistro">

<h5>Datos Cliente</h5>

<input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>

<input type="text" id="apellido" class="form-control mb-2" placeholder="Apellido" required>

<input type="text" id="dni" class="form-control mb-2" placeholder="DNI">

<input type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono">

<input type="text" id="direccion" class="form-control mb-3" placeholder="Dirección">


<h5>Datos Usuario</h5>

<input type="text" id="usuarioRegistro" class="form-control mb-2" placeholder="Usuario" required>

<input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

<input type="password" id="contrasena" class="form-control mb-3" placeholder="Contraseña" required>


<button type="submit" class="btn btn-success w-100">
Crear Cuenta
</button>

</form>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/login.js"></script>

</body>

</html>
