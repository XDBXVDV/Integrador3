<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toishan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
            <h2 class="text-center mb-4">Iniciar Sesión</h2>
            
            <form id="formLogin">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="usuarioLogin" class="form-control" placeholder="Tu usuario" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="contrasenaLogin" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ingresar</button>
            </form>

            <div class="mt-3 text-center">
                <p class="small text-muted">¿No tienes cuenta? 
                    <a href="#" data-bs-toggle="modal" data-bs-target="#modalRegistro">Regístrate aquí</a>
                </p>
                <hr>
                <a href="index.html" class="text-decoration-none">← Volver a la tienda</a>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRegistro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Crear Cuenta Nueva</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formRegistro">
                        <div class="row">
                            <div class="col-6 mb-2"><input type="text" id="nombre" class="form-control" placeholder="Nombre" required></div>
                            <div class="col-6 mb-2"><input type="text" id="apellido" class="form-control" placeholder="Apellido" required></div>
                        </div>
                        <input type="text" id="dni" class="form-control mb-2" placeholder="DNI (8 dígitos)" required maxlength="8">
                        <input type="text" id="telefono" class="form-control mb-2" placeholder="Teléfono">
                        <input type="text" id="direccion" class="form-control mb-3" placeholder="Dirección">
                        <hr>
                        <input type="text" id="usuarioRegistro" class="form-control mb-2" placeholder="Elige un usuario" required>
                        <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
                        <input type="password" id="contrasena" class="form-control mb-3" placeholder="Crea una contraseña" required>
                        <button type="submit" class="btn btn-success w-100">Completar Registro</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
