<head>
    <meta charset="UTF-8">
    <title>Detalles del Empleado</title>
    <link rel="stylesheet" href="../css/detalles.css">
</head>
<body>

<h2>Detalle del Empleado</h2>

<form id="formEditarEmpleado">

  <input type="hidden" id="idEmpleado">

  <h3>Datos del Empleado</h3>

  <label>Nombre</label>
  <input type="text" id="nombre" required>

  <label>Apellido</label>
  <input type="text" id="apellido" required>

  <label>DNI</label>
  <input type="text" id="dni">

  <h3>Datos del Usuario</h3>

  <label>Usuario</label>
  <input type="text" id="usuario" required>

  <label>Email</label>
  <input type="email" id="email" required>

  <button type="submit">Guardar cambios</button>

  <button type="button" onclick="abrirCambioPassword()">
    Cambiar contraseña
  </button>

  <a href="tablaempleado.html">Volver</a>
</form>

<script src="../js/usuario.js"></script>
<script src="../js/empleado-detalle.js"></script>

<div id="modalPassword" class="modal">
  <div class="modal-content">
    <h3>Cambiar contraseña</h3>

    <input type="password" id="passActual" placeholder="Contraseña actual">
    <input type="password" id="passNueva" placeholder="Nueva contraseña">

    <button onclick="guardarPassword()">Guardar</button>
    <button onclick="cerrarModalPassword()">Cancelar</button>
  </div>
</div>
