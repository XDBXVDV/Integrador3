<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generar Cotización - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0">Generar Cotización para Pedido #<span id="nroPedido"></span></h5>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Seleccionar Proveedor</label>
                        <select id="selectProveedor" class="form-select border-primary">
                            <option value="">Cargando proveedores...</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Producto</th>
                                <th class="text-center" style="width: 100px;">Cant.</th>
                                <th class="text-center" style="width: 200px;">Precio Unit. Ofertado (S/)</th>
                                <th class="text-end" style="width: 150px;">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCotizar">
                            </tbody>
                        <tfoot>
                            <tr class="table-light">
                                <td colspan="3" class="text-end fw-bold">TOTAL COTIZADO:</td>
                                <td class="text-end fw-bold text-primary">S/ <span id="totalCotizacion">0.00</span></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>

                <div class="text-end mt-4">
                    <a href="gestion_pedidos.html" class="btn btn-outline-secondary me-2">Cancelar</a>
                    <button class="btn btn-success px-5" onclick="enviarCotizacion()">
                        <i class="fas fa-save me-2"></i> REGISTRAR COTIZACIÓN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/generar_cotizacion.js"></script>
        <script src="../js/auth.js"></script>
<script>
    verificarEmpleado();
</script>
</body>
</html>
