<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - Toishan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 id="rolTitulo" class="text-primary">---</h3>
                        <hr>
                        <h4 id="nombreCompleto">Cargando...</h4>
                        <br>
                        <h5 class="text-start">Datos de Usuario</h5>
                        <p class="text-start"><strong>Usuario:</strong> <span id="usuarioPerfil"></span></p>
                        <p class="text-start"><strong>Email:</strong> <span id="emailPerfil"></span></p>
                        <p class="text-start"><strong>Estado:</strong> <span id="estadoPerfil" class="badge bg-success">Activo</span></p>
                        <hr>
                        <h5 class="text-start">Datos Personales</h5>
                        <p class="text-start"><strong>DNI:</strong> <span id="dniPerfil"></span></p>
                        <p class="text-start"><strong>Teléfono:</strong> <span id="telefonoPerfil"></span></p>
                        <p class="text-start"><strong>Dirección:</strong> <span id="direccionPerfil"></span></p>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <button class="btn btn-warning" onclick="abrirModalEditar()">Editar Perfil</button>
                    <a href="index.html" class="btn btn-secondary">Volver</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarPerfil" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Mis Datos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarPerfil">
                        <h5>Datos Personales</h5>
                        <input type="text" id="editNombre" class="form-control mb-2" placeholder="Nombre" required>
                        <input type="text" id="editApellido" class="form-control mb-2" placeholder="Apellido" required>
                        <input type="text" id="editDni" class="form-control mb-2" placeholder="DNI" required>
                        <input type="text" id="editTelefono" class="form-control mb-2" placeholder="Teléfono">
                        <input type="text" id="editDireccion" class="form-control mb-3" placeholder="Dirección">
                        <hr>
                        <h5>Datos de Cuenta</h5>
                        <input type="text" id="editUsuario" class="form-control mb-2" placeholder="Usuario" required>
                        <input type="email" id="editEmail" class="form-control mb-3" placeholder="Email" required>
                        <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/perfil.js"></script>
</body>
</html>
