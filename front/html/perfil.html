<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/perfil.css">
</head>
<body>
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow mb-4">
                    <div class="card-body text-center">
                        <h3 id="rolTitulo" class="text-primary text-uppercase">---</h3>
                        <hr>
                        <h4 id="nombreCompleto">Cargando...</h4>
                        <div class="row text-start mt-4">
                            <div class="col-md-6">
                                <h5>Datos de Cuenta</h5>
                                <p><strong>Usuario:</strong> <span id="usuarioPerfil"></span></p>
                                <p><strong>Email:</strong> <span id="emailPerfil"></span></p>
                                <p><strong>Estado:</strong> <span id="estadoPerfil" class="badge bg-success">Activo</span></p>
                            </div>
                            <div class="col-md-6 border-start">
                                <h5>Datos Personales</h5>
                                <p><strong>DNI:</strong> <span id="dniPerfil"></span></p>
                                <p><strong>Teléfono:</strong> <span id="telefonoPerfil"></span></p>
                                <p><strong>Dirección:</strong> <span id="direccionPerfil"></span></p>
                            </div>
                        </div>
                        <div class="mt-3">
                            <button class="btn btn-warning" onclick="abrirModalEditar()">Editar Perfil</button>
                            <a href="index.html" class="btn btn-secondary">Volver</a>
                        </div>
                    </div>
                </div>

                <div id="seccionHistorial" style="display: none;">
                    <div class="card shadow">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Mis Pedidos Realizados</h5>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Orden #</th>
                                        <th>Fecha</th>
                                        <th>Total</th>
                                        <th>Estado</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-pedidos">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarPerfil" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Mis Datos</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarPerfil">
                        <input type="text" id="editNombre" class="form-control mb-2" placeholder="Nombre" required>
                        <input type="text" id="editApellido" class="form-control mb-2" placeholder="Apellido" required>
                        <input type="text" id="editDni" class="form-control mb-2" placeholder="DNI" required>
                        <input type="text" id="editTelefono" class="form-control mb-2" placeholder="Teléfono">
                        <input type="text" id="editDireccion" class="form-control mb-3" placeholder="Dirección">
                        <hr>
                        <input type="text" id="editUsuario" class="form-control mb-2" placeholder="Usuario" required>
                        <input type="email" id="editEmail" class="form-control mb-3" placeholder="Email" required>
                        <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetallePedido" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Detalle de la Orden #<span id="numPedido"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio Unit.</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="lista-detalle-pedido">
                            </tbody>
                    </table>
                    <div class="text-end pe-4">
                        <h4>Total Pago: S/ <span id="totalPedidoModal">0.00</span></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/perfil.js"></script>
</body>
</html>
