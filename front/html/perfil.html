<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow mb-4">
                    <div class="card-body text-center">
                        <h3 id="rolTitulo" class="text-primary text-uppercase fw-bold">---</h3>
                        <hr>
                        <h4 id="nombreCompleto" class="mb-4">Cargando...</h4>
                        
                        <div class="row text-start">
                            <div class="col-md-6 mb-3">
                                <h5 class="text-secondary"><i class="fa fa-user-circle"></i> Cuenta</h5>
                                <p><strong>Usuario:</strong> <span id="usuarioPerfil"></span></p>
                                <p><strong>Email:</strong> <span id="emailPerfil"></span></p>
                                <p><strong>Estado:</strong> <span id="estadoPerfil" class="badge">---</span></p>
                            </div>
                            <div class="col-md-6 border-start mb-3">
                                <h5 class="text-secondary"><i class="fa fa-id-card"></i> Personal</h5>
                                <p><strong>DNI:</strong> <span id="dniPerfil"></span></p>
                                <p><strong>Teléfono:</strong> <span id="telefonoPerfil"></span></p>
                                <p><strong>Dirección:</strong> <span id="direccionPerfil"></span></p>
                            </div>
                        </div>

                        <div class="mt-4 d-flex justify-content-center gap-2">
                            <button class="btn btn-warning" onclick="abrirModalEditar()">
                                <i class="fa fa-edit"></i> Editar Datos
                            </button>
                            <button class="btn btn-dark" onclick="abrirModalPassword()">
                                <i class="fa fa-lock"></i> Seguridad
                            </button>
                            <a href="index.html" class="btn btn-secondary">Volver</a>
                        </div>
                    </div>
                </div>

                <div id="cardAccesoPedidos" class="card shadow border-primary" style="display: none;">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-1 text-primary">Mis Compras</h5>
                            <p class="mb-0 text-muted small">Revisa tu historial y descarga tus facturas.</p>
                        </div>
                        <a href="mis_pedidos.html" class="btn btn-primary">
                            Ir a mis pedidos <i class="fa fa-arrow-right ms-2"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditarPerfil" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title fw-bold">Editar Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarPerfil">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="small fw-bold">Nombre</label>
                                <input type="text" id="editNombre" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label class="small fw-bold">Apellido</label>
                                <input type="text" id="editApellido" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">DNI</label>
                            <input type="text" id="editDni" class="form-control" required>
                        </div>
                        <div class="mb-2">
                            <label class="small fw-bold">Teléfono</label>
                            <input type="text" id="editTelefono" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Dirección</label>
                            <input type="text" id="editDireccion" class="form-control">
                        </div>
                        <hr>
                        <div class="mb-2">
                            <label class="small fw-bold text-muted">Usuario</label>
                            <input type="text" id="editUsuario" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold text-muted">Email</label>
                            <input type="email" id="editEmail" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalPassword" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Seguridad</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formPassword">
                        <div class="mb-3">
                            <label class="small fw-bold">Clave Actual</label>
                            <input type="password" id="passActual" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Nueva Clave</label>
                            <input type="password" id="passNueva" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="small fw-bold">Confirmar Clave</label>
                            <input type="password" id="passConfirmar" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Cambiar Clave</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/perfil.js"></script>
</body>
</html>
