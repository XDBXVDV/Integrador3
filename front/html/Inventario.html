<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario General | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container-fluid mt-4 px-4">
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-dark text-white rounded-top d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0"><i class="fas fa-boxes-stacked me-2"></i> Control de Inventario</h4>
                <button class="btn btn-danger fw-bold" onclick="descargarReporteInventario()">
                    <i class="fas fa-file-pdf me-2"></i> Exportar Vista Actual
                </button>
            </div>
            
            <div class="card-body bg-white border-bottom p-4">
                <div class="row">
                    <div class="col-md-12">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-white border-end-0 text-muted">
                                <i class="fas fa-search"></i>
                            </span>
                            <input type="text" id="busqNombre" class="form-control border-start-0 ps-0" 
                                   placeholder="Buscar producto por nombre..." onkeyup="cargarInventario()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-body bg-light border-bottom">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">CATEGORÍA</label>
                        <select id="filtCategoria" class="form-select" onchange="cargarInventario()">
                            <option value="">Todas las categorías</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">MARCA</label>
                        <select id="filtMarca" class="form-select" onchange="cargarInventario()">
                            <option value="">Todas las marcas</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold text-muted">ESTADO OPERATIVO</label>
                        <select id="filtEstado" class="form-select" onchange="cargarInventario()">
                            <option value="Activo">Solo Activos</option>
                            <option value="Inactivo">Solo Inactivos</option>
                            <option value="">Ver Todos</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-outline-secondary w-100" onclick="resetFiltros()">
                            <i class="fas fa-undo me-2"></i> Limpiar Búsqueda
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Código</th>
                            <th>Producto</th>
                            <th>Categoría / Marca</th>
                            <th class="text-center">Stock Actual</th>
                            <th class="text-center">Mínimo</th>
                            <th>Estado</th>
                            <th>Condición</th>
                        </tr>
                    </thead>
                    <tbody id="tablaInventario">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/inventario.js"></script>
    <script  src="../js/navbarempleados.js"></script>
</body>
</html>
