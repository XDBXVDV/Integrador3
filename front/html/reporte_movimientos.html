<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes de Almacén | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
    <h5 class="mb-0"><i class="fas fa-chart-line me-2"></i> Reporte de Movimientos de almacén</h5>
    <button class="btn btn-light btn-sm fw-bold" onclick="descargarReporteConsolidado()">
        <i class="fas fa-file-pdf me-2 text-danger"></i> Exportar PDF Consolidado
    </button>
    </div>
            <div class="card-body bg-white border-bottom">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">DESDE</label>
                        <input type="date" id="fechaInicio" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">HASTA</label>
                        <input type="date" id="fechaFin" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">TIPO</label>
                        <select id="filtTipo" class="form-select">
                            <option value="">Todos los movimientos</option>
                            <option value="ENTRADA">Solo Entradas</option>
                            <option value="SALIDA">Solo Salidas</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button class="btn btn-dark w-100" onclick="consultarMovimientos()">
                            <i class="fas fa-search me-2"></i> Generar Reporte
                        </button>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Fecha y Hora</th>
                                <th>N° Guía</th>
                                <th>Tipo</th>
                                <th>Motivo</th>
                                <th>Responsable</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaReporte">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/reporte_movimientos.js"></script>
    <script src="../js/navbarempleados.js"></script>
</body>
</html>
