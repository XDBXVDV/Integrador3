<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Proveedores - Toishan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Gestión de Proveedores</h1>
            <button class="btn btn-primary" onclick="document.getElementById('modalCrear').style.display='flex'">
                <i class="fa fa-plus"></i> Nuevo proveedor
            </button>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <table id="tablaProveedores" class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th><th>Razón Social</th><th>RUC</th><th>Teléfono</th>
                            <th>Dirección</th><th>Email</th><th>Estado</th><th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalEditar" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1050;">
        <div class="modal-content bg-white p-4 rounded shadow" style="width:400px;">
            <h3>Editar proveedor</h3>
            <input type="hidden" id="editidProveedor">
            <label>Razón Social</label><input type="text" id="editrazonSocial" class="form-control mb-2">
            <label>Teléfono</label><input type="text" id="edittelefono" class="form-control mb-2">
            <label>Dirección</label><input type="text" id="editdireccion" class="form-control mb-2">
            <label>Email</label><input type="email" id="editemail" class="form-control mb-3">
            <div class="d-flex gap-2">
                <button class="btn btn-success w-100" onclick="CrudDinamico.guardarEdicion()">Guardar</button>
                <button class="btn btn-secondary w-100" onclick="document.getElementById('modalEditar').style.display='none'">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="modalCrear" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1050;">
        <div class="modal-content bg-white p-4 rounded shadow" style="width:400px;">
            <h3>Nuevo proveedor</h3>
            <form id="formCrearInputs">
                <label>Razón Social</label><input type="text" id="createrazonSocial" class="form-control mb-2">
                <label>RUC</label><input type="text" id="createruc" class="form-control mb-2">
                <label>Teléfono</label><input type="text" id="createtelefono" class="form-control mb-2">
                <label>Email</label><input type="email" id="createemail" class="form-control mb-2">
                <label>Dirección</label><input type="text" id="createdireccion" class="form-control mb-3">
            </form>
            <div class="d-flex gap-2">
                <button class="btn btn-primary w-100" onclick="CrudDinamico.guardarNuevo()">Crear</button>
                <button class="btn btn-secondary w-100" onclick="document.getElementById('modalCrear').style.display='none'">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/crud-dinamico.js"></script>
    <script src="../js/navbarempleados.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            verificarEmpleado(); 
            
            CrudDinamico.init({
                api: "http://localhost:8080/proveedor",
                tabla: "#tablaProveedores",
                idCampo: "idProveedor",
                columnas: ["idProveedor", "razonSocial", "ruc", "telefono", "direccion", "email", "estado"],
                formCrear: ["razonSocial", "ruc", "telefono", "email", "direccion"],
                formEditar: ["idProveedor", "razonSocial", "telefono", "direccion", "email"]
            });
        });
    </script>
</body>
</html>
