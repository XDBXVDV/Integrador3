<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportes de Ventas - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .card-chart { min-height: 350px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4 no-print">
            <h2><i class="fa fa-chart-bar text-primary"></i> Panel de Estadísticas</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-danger" onclick="exportarPDF()">
                    <i class="fa fa-file-pdf"></i> Exportar PDF
                </button>
                <button class="btn btn-success" onclick="exportarExcel()">
                    <i class="fa fa-file-excel"></i> Excel
                </button>
            </div>
        </div>

        <div class="card shadow-sm mb-4 no-print">
            <div class="card-body">
                <div class="row align-items-end">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Rango de fechas</label>
                        <div class="input-group">
                            <input type="date" id="repDesde" class="form-control">
                            <span class="input-group-text">al</span>
                            <input type="date" id="repHasta" class="form-control">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-primary w-100" onclick="cargarReportes()">
                            Actualizar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm card-chart">
                    <div class="card-header bg-white fw-bold">Ventas Diarias (S/)</div>
                    <div class="card-body">
                        <canvas id="chartVentas"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm card-chart">
                    <div class="card-header bg-white fw-bold">Top 5 Productos Vendidos</div>
                    <div class="card-body">
                        <canvas id="chartTop"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row text-center mb-5">
            <div class="col-md-4">
                <div class="card border-primary mb-3">
                    <div class="card-body">
                        <h6 class="text-muted">Total Ingresos</h6>
                        <h3 id="resumenTotal" class="text-primary fw-bold">S/ 0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-success mb-3">
                    <div class="card-body">
                        <h6 class="text-muted">Órdenes Realizadas</h6>
                        <h3 id="resumenOrdenes" class="text-success fw-bold">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-info mb-3">
                    <div class="card-body">
                        <h6 class="text-muted">Promedio por Venta</h6>
                        <h3 id="resumenTicket" class="text-info fw-bold">S/ 0.00</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/reportes.js"></script>
        <script src="../js/auth.js"></script>
<script>
    verificarEmpleado();
</script>
</body>
</html>
