<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Productos - Toishan</title>
<a href="area_empleados.html">Regresar</a>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/producto.css">

</head>

<body>

<div class="container">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Gestión de Productos</h2>

<button class="btn btn-primary" onclick="abrirModalCrear()">
Nuevo Producto
</button>

</div>

<div class="card shadow">

<div class="card-body">

<table class="table table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Imagen</th>
<th>Nombre</th>
<th>Categoría</th>
<th>Marca</th>
<th>Precio</th>
<th>Stock</th>
<th>Stock mínimo</th>
<th>Estado</th>
<th>Condición</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaProductos"></tbody>

</table>

</div>
</div>
</div>


<div class="modal fade" id="modalProducto" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title" id="modalTitulo">
Nuevo Producto
</h5>

<button type="button" class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="formProducto">

<input type="hidden" id="idProducto">


<div class="mb-3">
<label class="form-label">Nombre</label>
<input type="text" id="nombre" class="form-control" required>
</div>


<div class="mb-3">
<label class="form-label">Descripción</label>
<textarea id="descripcion" class="form-control"></textarea>
</div>


<div class="mb-3">
    <label class="form-label">Imagen</label>
    <input type="file" id="imagen" class="form-control" accept="image/*">

<img id="imagenPreview"
width="120"
style="display:none;margin-top:10px;border-radius:8px;">
</div>




<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Precio</label>
<input type="number" step="0.01" id="precio" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Stock Inicial</label>
<input type="number" id="stock" class="form-control" required>
</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Stock Mínimo</label>
<input type="number" id="stockMinimo" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Estado</label>

<select id="estado" class="form-select">
<option value="Activo">Activo</option>
<option value="Inactivo">Inactivo</option>
</select>

</div>

</div>


<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Categoría</label>

<select id="idCategoria" class="form-select" required>
<option value="">Seleccione...</option>
</select>

</div>


<div class="col-md-6 mb-3">

<label class="form-label">Marca</label>

<select id="idMarca" class="form-select" required>
<option value="">Seleccione...</option>
</select>

</div>

</div>

<button type="submit" class="btn btn-success w-100">
Guardar
</button>

</form>

</div>
</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/producto.js"></script>

<script src="../js/auth.js"></script>
<script>
verificarEmpleado();
</script>


</body>
</html>
