<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Respaldos | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">

<body class="bg-light">

    <div class="container mt-5">

                <button class="btn btn-success btn-sm" onclick="ejecutarNuevoBackup()">

            </div>
            <div class="card-body">
                <p class="text-muted small">Aquí puedes gestionar los puntos de restauración de tu sistema.</p>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Nombre del Archivo</th>
                                <th>Fecha de Creación</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="listaBackups">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/backups.js"></script>
