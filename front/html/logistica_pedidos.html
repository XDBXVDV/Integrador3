<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Logística - Procesar Requerimientos | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="card shadow border-0 mb-4">
            <div class="card-body bg-primary text-white rounded">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <h4 class="mb-1"><i class="fas fa-truck-loading me-2"></i> Gestión de Logística</h4>
                        <p class="mb-0 opacity-75">Seleccione los requerimientos de almacén para generar una Orden de Compra.</p>
                    </div>
                    <div class="col-md-4 text-end">
                        <button class="btn btn-light fw-bold" onclick="generarPedidoOficial()">
                            <i class="fas fa-check-circle me-2 text-success"></i> Crear Pedido de Compra
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">1. Seleccionar Proveedor</div>
                    <div class="card-body">
                        <select id="selectProveedor" class="form-select">
                            <option value="">-- Elija un proveedor --</option>
                            </select>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold">2. Requerimientos Pendientes de Almacén</div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                                    <th>Producto</th>
                                    <th>Cant. Solicitada</th>
                                    <th>Prioridad</th>
                                    <th>Solicitante</th>
                                </tr>
                            </thead>
                            <tbody id="listaRequerimientos">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/logistica_pedidos.js"></script>
</body>
</html>
