<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Empleados</title>

<link rel="stylesheet" href="../css/navbar.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

</head>

<body>

<div id="navbarContainer"></div>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Empleados</h2>

<button class="btn btn-primary" onclick="abrirModalCrear()">
Nuevo Empleado
</button>

</div>


<div class="card shadow">

<div class="card-body">

<table id="tablaEmpleadosData" class="table table-hover">

<thead class="table-dark">

<tr>
<th>Nombre</th>
<th>DNI</th>
<th>Rol</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaEmpleados"></tbody>

</table>

</div>

</div>

</div>



<div class="modal fade" id="modalEmpleado">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 id="modalTitulo">Empleado</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="formEmpleado">

<input type="hidden" id="idEmpleado">

<h5>Datos del Empleado</h5>

<input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre" required>

<input type="text" id="apellido" class="form-control mb-2" placeholder="Apellido" required>

<input type="text" id="dni" class="form-control mb-3" placeholder="DNI">


<h5>Datos del Usuario</h5>

<input type="text" id="usuario" class="form-control mb-2" placeholder="Usuario" required>

<input type="email" id="email" class="form-control mb-2" placeholder="Email" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">


<label>Rol</label>

<select id="rol" class="form-control mb-3">

<option value="">Seleccione rol</option>
<option value="2">Administrador</option>
<option value="3">Ventas</option>
<option value="4">Compras</option>
<option value="5">Almacén</option>

</select>


<div class="d-flex gap-2">

<button class="btn btn-success w-100">Guardar</button>

<button type="button" class="btn btn-danger w-100"
onclick="desactivarUsuario()"
id="btnDesactivar">
Desactivar
</button>

</div>

</form>

</div>

</div>

</div>

</div>



<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/navbarempleados.js"></script>
<script src="../js/auth.js"></script>

<script>
    soloadmin();
</script>

<script src="../js/empleados.js"></script>

</body>

</html>
