<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén - Reposición de Stock | TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="card bg-danger text-white shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-boxes fa-3x me-3"></i>
                        <div>
                            <h5 class="mb-0" id="countAgotados">0</h5>
                            <small>Productos Agotados</small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark shadow-sm border-0">
                    <div class="card-body d-flex align-items-center">
                        <i class="fas fa-exclamation-circle fa-3x me-3"></i>
                        <div>
                            <h5 class="mb-0" id="countBajos">0</h5>
                            <small>Stock Bajo</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0"><i class="fas fa-list-check me-2"></i> Generar Pedido de faltantes</h5>
                <button class="btn btn-primary fw-bold" onclick="enviarRequerimientoMasivo()">
                    <i class="fas fa-paper-plane me-2"></i> Enviar a Compras
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="tablaStock">
                        <thead class="table-light">
                            <tr>
                                <th width="40px"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                                <th>Producto / Categoría</th>
                                <th>Stock Actual</th>
                                <th>Mínimo</th>
                                <th>Prioridad Sugerida</th>
                                <th>Cant. a Pedir</th>
                            </tr>
                        </thead>
                        <tbody id="listaFaltantes">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/almacen_reposicion.js"></script>
        <script src="../js/auth.js"></script>
<script>
    verificarEmpleado();
</script>
</body>
</html>
