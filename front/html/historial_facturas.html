<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Facturas - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="bg-light">
    <div id="navbarContainer"></div>

    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h5 class="mb-0"><i class="fas fa-history me-2"></i> Historial de Compras y Facturas</h5>
                <div class="d-flex gap-2">
                    <input type="text" id="busqueda" class="form-control form-control-sm" placeholder="Buscar proveedor o factura...">
                    <button class="btn btn-light btn-sm" onclick="cargarHistorial()"><i class="fas fa-sync"></i>Quitar filtros</button>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-secondary">
                            <tr>
                                <th>Fecha Registro</th>
                                <th>Nro. Orden</th>
                                <th>Proveedor</th>
                                <th>Factura (Serie-Corr)</th>
                                <th class="text-end">Total Pagado</th>
                                <th class="text-center">Documento</th>
                            </tr>
                        </thead>
                        <tbody id="tablaHistorial">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navbarempleados.js"></script>
    <script src="../js/historial_facturas.js"></script>
</body>
</html>
