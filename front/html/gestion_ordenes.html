<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Órdenes - TOISHAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Órdenes de Compra por Facturar</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Nro Orden</th>
                            <th>Proveedor</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaOrdenes">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalFactura" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Registrar Factura y Cargar Stock</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="idOrdenSeleccionada">
                    <div class="mb-3">
                        <label class="form-label">Serie (Ej: F001)</label>
                        <input type="text" id="serie" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correlativo (Ej: 000456)</label>
                        <input type="text" id="correlativo" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Adjuntar Factura (PDF)</label>
                        <input type="file" id="archivoPdf" class="form-control" accept=".pdf">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-success" onclick="procesarFactura()">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/gestion_ordenes.js"></script>
        <script src="../js/auth.js"></script>
<script>
    verificarEmpleado();
</script>
</body>
</html>
